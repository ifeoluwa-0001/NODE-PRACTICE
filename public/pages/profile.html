<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/navstyle.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <p class="logo_text">
                    TestServer_
                </p>
            </div>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/order">Order</a></li>
            </ul>
        </nav>
    </header>


    <main>

        <section class="account sectn">
        
            <section class="profile">

                <table class="hhh">
                    <tr>
                        <td class="clsfr no-bdr-btm" colspan="2">
                                <div></div>
                                <h2>
                                    Basic information
                                </h2>
                        </td>
                    </tr>


                    <tr>
                        <td class="iii aaa" >Firstname:</td>
                        <td class="iii bbb" id="firstname-field" ></td>
                    </tr>
                    <tr>
                        <td class="iii aaa" >Lastname:</td>
                        <td class="iii bbb" id="lastname-field" ></td>
                    </tr>
                    
                    
                    <tr>
                        <td class="iii aaa" >Date of birth:</td>
                        <td class="iii bbb" id="dob-field" ></td>
                    </tr>

                    <!-- <tr>
                        <td class="iii aaa no-bdr-btm" >Password:</td>
                        <td class="iii bbb no-bdr-btm" >.........</td>
                    </tr> -->

                    <tr>
                        <td class="clsfr no-bdr-btm" colspan="2">
                                <div></div>
                                <h2>
                                    Contact information
                                </h2>
                        </td>
                    </tr>

                    <tr>
                        <td class="iii aaa" >E-mail:</td>
                        <td class="iii bbb" id="email-field" ></td>
                    </tr>

                    <tr>
                        <td class="iii aaa no-bdr-btm" >Phone:</td>
                        <td class="iii bbb no-bdr-btm" id="phone-field" ></td>
                    </tr>

                </table>

                <button class="save" >Save changes</button>
                            
            </section>
        
        </section>

    </main>

    

    

    <footer>&copy; 2003 WEBSITE NAME.Inc</footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const firstname = document.getElementById('firstname-field');
            const lastname = document.getElementById('lastname-field');
            const dateofbirth = document.getElementById('dob-field');
            const email = document.getElementById('email-field');
            const phone = document.getElementById('phone-field');
            //const username = document.getElementById('username-field');

            const rawcookie = decodeURIComponent(document.cookie);
            const userDataindex = rawcookie.indexOf('userData');

            const userDatacookie = rawcookie.slice(userDataindex);
            const cookieindex = userDatacookie.indexOf('{');
            const cookie = userDatacookie.slice(cookieindex);

            const user = JSON.parse(cookie);

            firstname.innerText = user.firstname;
            lastname.innerText = user.lastname;
            dateofbirth.innerText = user.age;
            email.innerText = user.email;
            phone.innerText = user.phone;


        });
    </script>
</body>
</html>
