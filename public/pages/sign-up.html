<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width ,initial-scale=1.0"/>
        <title>Sign up</title>
        <!-- <link rel="icon" href="data:,"> -->
        <link rel="stylesheet" href="css/navstyle.css">
        <link rel="stylesheet" href="css/sign-up.css">
    </head>
    <body>

        <nav>
            <div class="logo">
                <p class="logo_text">
                    TestServer_
                </p>
            </div>
            <ul>
                <li><a href="/home">Home</a></li>
                <li><a href="/order">Order</a></li>
            </ul>
        </nav>

        <h1>Sign up</h1>

        <form id="form" action="/register" method="POST" >
            
            <div class="input-box">
                <b><label for="firstname">Firstname:</label></b>
                <p>
                    <input type="text" id="firstname" name="firstname" placeholder="firstname" autocomplete="on" autofocus required minlength="2" maxlength="32" />
                </p>
                <p id="ww" class="message err-firstname"></p>
            </div>
            
            <div class="input-box">
                <b><label for="lastname">Lastname:</label></b>
                <p>
                    <input type="text" id="lastname" name="lastname" placeholder="lastname" required minlength="2" maxlength="32" />
                </p>
                <p class="message err-lastname"></p>
            </div>

            <div class="input-box">
                <b><label for="email">E-mail:</label></b>
                <p>
                    <input type="mail" id="email" name="email" placeholder="E-mail" required />
                </p>
                <p class="message err-mail"></p>
            </div>
            
            <div class="input-box">
                <b><label for="age">Age:</label></b>
                <p>
                    <input type="number" id="age" name="age" placeholder="age" required min="13" max="200"/>
                </p>
                <p class="message err-age"></p>
            </div>
            
            <div class="input-box">
                <b><label for="phonenumber">Phone Number:</label></b>
                <p>
                    <input type="tel" name="phone" id="phonenumber" required placeholder="08182247332" minlength="11" maxlength="11" />
                </p>
                <p class="message err-phonenumber"></p>
            </div>
            
            <div class="input-box">
                <b><label for="password">Password:</label></b>
                <p>
                    <input type="password" id="password" name="password" placeholder="password" required minlength="8" maxlength="16" />
                </p>
                <p class="message pass"></p>
            </div>
            <p><small>Already have an account</small> <a href="/pages/sign-in.html">Sign-in</a></p>
            <input type="submit">
            
        </form>
         <script>

            /* Errors
                    Name
                    1. Enter your name
                    2. Name can only contain alphabets
                    3. Name has to be at least 3 characters long and less than 16 characters.
                    
                    Age
                    1. User must be at least 12 years old
                    2. User can not older than 200
                    3. Age can only be a number

                    Phone +234 816-652-0710
                    1. Phone must contain only numbers
                    2. Phone must be 11 digits

                    Password
                    1. Password must be at least 8 characters long
                    2. Password must be less than 12 characters long
                    3. Password must contain at least one of the following special charcters {*, -, _}
                    4. Password must contain letters and numbers.
                    Pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#\$%\^&\*])(?=.{8,})/

                    Email
                    1. E-mail must be at least at least 12 characters long
                    2. E-mail must be at most 36 characters long
                    3. E-mail must be a valid email address
                    E-mail pattern =  /^(([^<>()\[\]\\.,;:\s@"]+(\.[^<>()\[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/;

                    */
                    


            document.addEventListener("DOMContentLoaded", function(){

                const form = document.getElementById("form");
                const firstname = form.elements['firstname'];
                const lastname = form.elements['lastname'];
                const age = form.elements['age'];
                const tel = form.elements['phonenumber'];
                const password = form.elements['password'];

                const msgBoxFirstName = document.getElementsByClassName("err-firstname")[0];
                const msgBoxLastName = document.getElementsByClassName("err-lastname")[0];
                const msgBoxAge = document.getElementsByClassName("err-age")[0];
                const msgBoxTel = document.getElementsByClassName("err-phonenumber")[0];
                const msgBoxPassword = document.getElementsByClassName("pass")[0];


                const NAMEMINLENGTH = 2;
                const NAMEMAXLENGTH = 32;
                const PHONENUMLENGTH = 11;
                const PASSWORDMINLENGTH = 8;
                const PASSWORDMAXLENGTH = 12;
                const MINAGE = 13;
                const MAXAGE = 200;

                let isFirstNameValid;
                let isLastNameValid;
                let isAgeValid;
                let isTelValid;
                let isPassValid;

                firstname.addEventListener('input', (event) => {
                        let userInput = event.target.value;
                        const isValid = validateName(msgBoxFirstName, userInput, 'Firstname');
                        
                        if(isValid){
                            isFirstNameValid = true;
                            firstname.style.border = '2px solid hsl(130, 55%, 45%)';
                        } else {
                            isFirstNameValid = false;
                            firstname.style.border = '2px solid hsl(0, 79%, 41%)';
                        };
                    });

                lastname.addEventListener('input', (event) => {
                    let userInput = event.target.value;
                    const isValid = validateName(msgBoxLastName, userInput, 'Lastname');

                    if(isValid){
                        isLastNameValid = true;
                        lastname.style.border = '2px solid hsl(130, 55%, 45%)';
                    } else {
                        isLastNameValid = false;
                        lastname.style.border = '2px solid hsl(0, 79%, 41%)';
                    };
                });

                age.addEventListener('input', (event) => {
                    let userInput = event.target.value;
                    const isValid = validateAge(msgBoxAge, userInput);

                    if(isValid){
                        isAgeValid = true;      
                        age.style.border = '2px solid hsl(130, 55%, 45%)';
                    } else {
                        isAgeValid = false;
                        age.style.border = '2px solid hsl(0, 79%, 41%)';
                    };
                });

                tel.addEventListener('input', (event) => {
                    let userInput = event.target.value;
                    const isValid = validateTel(msgBoxTel, userInput);

                    if(isValid){
                        isTelValid = true;
                        tel.style.border = '2px solid hsl(130, 55%, 45%)';
                    } else {
                        isTelValid = false;
                        tel.style.border = '2px solid hsl(0, 79%, 41%)';
                    };
                });
                
                password.addEventListener('input', (event) => {
                    let userInput = event.target.value;
                    const isValid = validatePassword(msgBoxPassword, userInput);

                    if(isValid){
                        isPassValid = true;
                        password.style.border = '2px solid hsl(130, 55%, 45%)';
                    } else {
                        isPassValid = false;
                        password.style.border = '2px solid hsl(0, 79%, 41%)';
                    };
                });

                
                const isEmpty = function(userInput){
                    return !userInput;
                };

                const isAllWhitespace = function(userInput){
                    const re = /^\s+$/;
                    return re.test(userInput);
                };

                const allLetters = function(input){
                    const re = /^[A-Za-z]+$/;
                    return re.test(input);
                };

                const lessThanMinlength = function(userInput, min){
                    const inputLength = userInput.length;
                    if(inputLength < min){ return true; };
                    return false;
                };

                const moreThanMaxlength = function(userInput, max){
                    const inputLength = userInput.length;
                    if(inputLength > max){ return true; };
                    return false;
                };

                const printMessage = function (messageBox, message){
                    messageBox.innerHTML = message;
                };


                const validateName = function(messageBox, userInputtedName, xname){
                    userInputtedName = userInputtedName.trim();
                    
                    if(isEmpty(userInputtedName)){
                        printMessage(messageBox, `Enter your ${xname}`);
                    } else if(lessThanMinlength(userInputtedName, NAMEMINLENGTH)){
                        printMessage(messageBox, `${xname} must be at least ${NAMEMINLENGTH} characters`);
                    } else if(moreThanMaxlength(userInputtedName, NAMEMAXLENGTH)){
                        printMessage(messageBox, `${xname} must be less than ${NAMEMAXLENGTH} characters`);
                    } else if(isAllWhitespace(userInputtedName)){
                        printMessage(messageBox, "Invalid input");
                    } else if(!allLetters(userInputtedName)){
                        printMessage(messageBox, "Name can only contain alphabets");
                    } else {
                        messageBox.innerHTML = '';
                        return true;
                    };
                };

                const validateAge = function (messageBox, userInputedAge){

                    if(isEmpty(userInputedAge)){
                        printMessage(messageBox, "Your age is required");
                    } else if(isAllWhitespace(userInputedAge)) {
                        printMessage(messageBox, "Invalid input");
                    } else if(!/^\d+$/.test(userInputedAge)){
                        printMessage(messageBox, "Age must contain only number");
                    } else if(userInputedAge < MINAGE){
                        printMessage(messageBox, `Sorry, you must be at least ${MINAGE} years old to sign up`);
                    } else if(userInputedAge > MAXAGE){
                        printMessage(messageBox, "Hmmm, be realistic");
                    } else { 
                        printMessage(messageBox, '');
                        return true;
                    };

                };

                const validateTel = function (messageBox, userInputedTel){
                    userInputedTel = userInputedTel.trim();
                    const userInputLength = userInputedTel.length;
                    
                    if(isEmpty(userInputedTel)){
                        printMessage(messageBox, "Your phone number is required");
                    } else if(isAllWhitespace(userInputedTel)) {
                        printMessage(messageBox, "Phone number is not valid");
                    } else if(/[^-\d]/.test(userInputedTel)){
                        printMessage(messageBox, "Phone number can only contain digits");
                    } else if(!(/^\d(-?\d){10}$/.test(userInputedTel))){
                        printMessage(messageBox, "Phone number must be 11 digits long");
                    } else { 
                        printMessage(messageBox, ''); 
                        return true;
                    };

                };

                const validatePassword = function (messageBox, userInputedPassword){
                    userInputedPassword = userInputedPassword.trim();
                    const re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#\$%\^&\*])(?=.{8,16})/;  


                    if(userInputedPassword.length < 8 || userInputedPassword > 16){
                        printMessage(messageBox, "Password must be more than 8 characters long and less than 16 characters long");
                    } else if(!re.test(userInputedPassword)){
                        printMessage(messageBox, `Password must contain:<br>1. At least one uppercase letter.<br>2. At least one lowercase letter.<br>3. At least one number.<br>4. At least one of these special characters(!@#$%^&*)`);
                    } else {
                        printMessage(messageBox, ''); 
                        return true;
                    }

                };

                
                form.addEventListener('submit', (event) => {
                    const isFormValid = (isFirstNameValid && isLastNameValid && isAgeValid && isTelValid && isPassValid)? true : false;
                    
                    if(isFormValid){
                        form.submit();
                    } else {
                        event.preventDefault();
                    };
                });
            });
        </script>

    </body>
</html>
