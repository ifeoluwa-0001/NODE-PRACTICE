        <h1>Sign up</h1>

        <form id="form" action="/submit" method="POST" >
            
            <div class="input-box">
                <b><label for="firstname">Firstname:</label></b>
                <p class="message err-firstname"></p>
                <p>
                    <input type="text" id="firstname" name="firstname" placeholder="firstname" autocomplete="on" autofocus required minlength="1" maxlength="32" />
                </p>
            </div>
            
            <div class="input-box">
                <b><label for="lastname">Lastname:</label></b>
                <p class="message err-lastname"></p>
                <p>
                    <input type="text" id="lastname" name="lastname" placeholder="lastname" required minlength="1" maxlength="32" />
                </p>
            </div>
            
            <div class="input-box">
                <b><label for="age">Age:</label></b>
                <p class="message err-age"></p>
                <p>
                    <input type="number" id="age" name="age" placeholder="age" required min="1" max="999"/>
                </p>
            </div>
            
            <div class="input-box">
                <b><label for="phonenumber">Phone Number:</label></b>
                <p class="message err-phonenumber"></p>
                <p>
                    <input type="tel" name="phone" id="phonenumber" required placeholder="08182247332" minlength="11" maxlength="11" />
                </p>
            </div>
            
            <div class="input-box">
                <b><label for="password">Password:</label></b>
                <p class="message pass"></p>
                <p>
                    <input type="password" id="password" name="password" placeholder="password" required minlength="8" maxlength="16" />
                </p>
            </div>
            
            <input type="submit">
            
        </form>
